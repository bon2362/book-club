name: Wiki Sync

on:
  push:
    branches: [main]
    paths:
      - 'docs/wiki/**'
      - '.github/workflows/wiki-sync.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone wiki repo
        run: |
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/bon2362/book-club.wiki.git" wiki

      - name: Replace wiki contents from docs/wiki
        run: |
          find wiki -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R docs/wiki/. wiki/

      - name: Commit and push wiki
        run: |
          cd wiki
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "docs: sync wiki from docs/wiki [skip ci]"
          git push
