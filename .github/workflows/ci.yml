name: CI

on:
  # Только pull_request. Прямой push в main запрещён branch protection
  # (enforce_admins: true), значит push в main = squash-merge от PR,
  # который CI уже проверил. Дублирующий run на main-SHA только тратит
  # CI-время и шумит в UI.
  pull_request:
    branches: [main]

# Если PR обновился (новый push или gh pr update-branch после strict-mode
# конфликта), старый CI run отменяется — auto-merge ждёт run на актуальном
# SHA, неактуальный результат никому не нужен. Экономит ~5 минут CI-времени
# на каждое обновление PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint / typecheck / unit tests ──────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Secret scan: defence-in-depth поверх pre-commit secretlint hook.
      # Если кто-то закоммитил с --no-verify или Husky был не установлен —
      # этот шаг ловит секреты до того, как Vercel задеплоит код на прод.
      # Тот же конфиг (.secretlintrc.json), что и в pre-commit.
      - name: Secret scan
        run: npx secretlint "**/*" --secretlintignore .gitignore

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests --coverage
        env:
          DATABASE_URL: postgresql://dummy:dummy@dummy/dummy
          SKIP_ENV_VALIDATION: 'true'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. E2E (Playwright) ───────────────────────────────────────────────────
  e2e:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install chromium --with-deps

      # Если браузер взят из кэша, системные зависимости всё равно нужны
      # (они не кэшируются), но install-deps без загрузки браузера — быстро.
      - name: Install Playwright system deps (from cache)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Синхронизируем схему e2e Neon-ветки с текущим schema.ts.
      # Используем push (не migrate): ветка создана через Neon branching,
      # поэтому __drizzle_migrations там нет — migrate пытается накатить
      # все миграции с нуля и падает на уже существующих таблицах.
      # push сравнивает schema.ts с реальной БД и применяет только дельту.
      - name: Sync DB schema (e2e branch)
        run: npx drizzle-kit push --force
        env:
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          SKIP_ENV_VALIDATION: 'true'

      - name: Get Allure history from gh-pages
        uses: actions/checkout@v5
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: E2E tests
        run: npm run test:e2e
        env:
          # E2E job бьёт в изолированную Neon-ветку `e2e`, НЕ в прод.
          # Guard в lib/test-mode.ts отказывается работать, если DATABASE_URL
          # содержит PROD_DB_HOST_MARKER или не содержит E2E_REQUIRE_DB_MARKER.
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          PROD_DB_HOST_MARKER: ${{ secrets.PROD_DB_HOST_MARKER }}
          E2E_REQUIRE_DB_MARKER: ${{ secrets.E2E_REQUIRE_DB_MARKER }}
          AUTH_SECRET: 'e2e-test-secret-only-used-for-signing-test-sessions'
          NEXTAUTH_TEST_MODE: 'true'
          NEXTAUTH_URL: 'http://localhost:3000'
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GOOGLE_SHEETS_ID: ${{ secrets.GOOGLE_SHEETS_ID }}
          SKIP_ENV_VALIDATION: 'true'

      - name: Install Allure CLI
        if: always()
        run: npm install -g allure-commandline

      - name: Restore Allure history
        if: always()
        run: cp -r gh-pages/history allure-results/history 2>/dev/null || true

      - name: Generate Allure report
        if: always()
        run: allure generate allure-results --clean -o allure-report

      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-report

  # ── 3. Next.js build ──────────────────────────────────────────────────────
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_SHEETS_PRIVATE_KEY: ${{ secrets.GOOGLE_SHEETS_PRIVATE_KEY }}
          GOOGLE_SHEETS_CLIENT_EMAIL: ${{ secrets.GOOGLE_SHEETS_CLIENT_EMAIL }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SKIP_ENV_VALIDATION: 'true'

  # ── Gate: branch protection требует check с именем "ci" ───────────────────
  ci:
    needs: [quality, e2e, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All jobs passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || \
                "${{ needs.e2e.result }}"    != "success" || \
                "${{ needs.build.result }}"  != "success" ]]; then
            echo "quality=${{ needs.quality.result }}"
            echo "e2e=${{ needs.e2e.result }}"
            echo "build=${{ needs.build.result }}"
            exit 1
          fi
