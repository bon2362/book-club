name: CI

on:
  # Только pull_request. Прямой push в main запрещён branch protection
  # (enforce_admins: true), значит push в main = squash-merge от PR,
  # который CI уже проверил. Дублирующий run на main-SHA только тратит
  # CI-время и шумит в UI.
  pull_request:
    branches: [main]

# Если PR обновился (новый push или gh pr update-branch после strict-mode
# конфликта), старый CI run отменяется — auto-merge ждёт run на актуальном
# SHA, неактуальный результат никому не нужен. Экономит ~5 минут CI-времени
# на каждое обновление PR.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint / typecheck / unit tests ──────────────────────────────────────
  quality:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # Secret scan: defence-in-depth поверх pre-commit secretlint hook.
      # Если кто-то закоммитил с --no-verify или Husky был не установлен —
      # этот шаг ловит секреты до того, как Vercel задеплоит код на прод.
      # Тот же конфиг (.secretlintrc.json), что и в pre-commit.
      - name: Secret scan
        run: npx secretlint "**/*" --secretlintignore .gitignore

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test -- --passWithNoTests --coverage
        env:
          DATABASE_URL: postgresql://dummy:dummy@dummy/dummy
          SKIP_ENV_VALIDATION: 'true'

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ── 2. Next.js build ──────────────────────────────────────────────────────
  #
  # E2E (Playwright) больше НЕ часть merge-gate. Они вынесены в отдельный
  # workflow .github/workflows/e2e-nightly.yml, который бежит по расписанию
  # (cron) и по ручному запуску — НЕ на push/PR. Причина: e2e-job платит
  # ~100s фиксированного оверхеда (install + браузеры + schema + build) и
  # ~270s на сами тесты, что держало мерж 6-7 минут. Для домашнего проекта с
  # парой пользователей это не оправдано: быстрый gate (lint/typecheck/unit/
  # build, ~80s) ловит «не собирается / битый тип / утёк секрет», а E2E ловит
  # регрессии сценариев ночью, постфактум — чиним форвардом.
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_SHEETS_PRIVATE_KEY: ${{ secrets.GOOGLE_SHEETS_PRIVATE_KEY }}
          GOOGLE_SHEETS_CLIENT_EMAIL: ${{ secrets.GOOGLE_SHEETS_CLIENT_EMAIL }}
          GOOGLE_SHEETS_SPREADSHEET_ID: ${{ secrets.GOOGLE_SHEETS_SPREADSHEET_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          SKIP_ENV_VALIDATION: 'true'

  # ── Gate: branch protection требует check с именем "ci" ───────────────────
  ci:
    needs: [quality, build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: All jobs passed
        run: |
          if [[ "${{ needs.quality.result }}" != "success" || \
                "${{ needs.build.result }}"  != "success" ]]; then
            echo "quality=${{ needs.quality.result }}"
            echo "build=${{ needs.build.result }}"
            exit 1
          fi
