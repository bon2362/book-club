# codecov.yml
coverage:
  status:
    project:
      default:
        target: 80%
        threshold: 2%
    patch:
      default:
        target: 70%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false

ignore:
  - "lib/db/migrations/**"
  - "lib/db/schema.ts"
  - "lib/db/index.ts"
  - "app/api/test/**"
  - "app/api/auth/[...nextauth]/**"
